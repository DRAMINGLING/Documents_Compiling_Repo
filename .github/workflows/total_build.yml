name: Manual Trigger and Process TXT Files

on:
  workflow_dispatch:  # 手动触发

jobs:
  process-txt-files:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.UPDATE_TEX_FILE }}  # 使用具有写权限的 token

      - name: Set up Git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Find all .txt files in list folder
        id: find-txt
        run: |
          cd list || exit 0  # 如果 list 文件夹不存在则退出
          files=$(ls *.txt 2>/dev/null || true)
          if [ -n "$files" ]; then
            echo "Found files: $files"
            # 将文件名列表存储为多行输出，后续步骤可读取
            echo "files<<EOF" >> $GITHUB_OUTPUT
            echo "$files" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "No .txt files found."
            echo "files=" >> $GITHUB_OUTPUT
          fi

      - name: Trigger corresponding workflows for each file
        if: steps.find-txt.outputs.files != ''
        env:
          GH_TOKEN: ${{ secrets.UPDATE_TEX_FILE }}  # 用于触发工作流的 token
        run: |
          # 循环处理每个文件
          while IFS= read -r file; do
            if [ -z "$file" ]; then continue; fi
            base_name="${file%.txt}"  # 去除扩展名，得到 A、B 等
            workflow_file="build_and_release-${base_name}.yml"
            echo "Attempting to trigger workflow: $workflow_file"
            
            # 触发指定工作流（假设工作流存在于 main 分支）
            if gh workflow run "$workflow_file" --ref main; then
              echo "Successfully triggered $workflow_file"
            else
              echo "Failed to trigger $workflow_file (maybe it doesn't exist)"
              # 可根据需要决定是否继续或退出，这里继续处理下一个文件
            fi
          done <<< "${{ steps.find-txt.outputs.files }}"

      - name: Delete all .txt files from list folder
        if: steps.find-txt.outputs.files != ''
        run: |
          cd list
          rm -f *.txt
          echo "Deleted all .txt files."

      - name: Commit and push changes
        if: steps.find-txt.outputs.files != ''
        run: |
          git add list
          git diff --quiet && git diff --staged --quiet || git commit -m "Remove processed .txt files from list"
          git push origin main

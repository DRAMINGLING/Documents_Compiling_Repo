name: Generate txt files for tex updates

on:
  push:
    branches:
      - main
    paths:
      - '**.tex'

permissions:
  contents: write

jobs:
  generate-txt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 关键：让 Git 以原始 UTF-8 输出文件名，避免中文被转义
      - name: Configure Git to output UTF-8 filenames
        run: git config --global core.quotepath false

      - name: Generate txt files for modified tex files
        run: |
          mkdir -p list

          # 安全读取文件名（支持空格、特殊字符）
          git diff --name-only --diff-filter=ACMRT ${{ github.event.before }} ${{ github.sha }} -- '*.tex' | while IFS= read -r tex_file; do
            base_name=$(basename "$tex_file" .tex)
            txt_file="list/${base_name}.txt"

            if [ ! -f "$txt_file" ]; then
              touch "$txt_file"
              echo "✅ Created: $txt_file"
            else
              echo "⏭️  Skipped (already exists): $txt_file"
            fi
          done

      - name: Commit and push if changes
        env:
          TOKEN: ${{ secrets.UPDATE_TEX_FILE }}
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

          git add list/

          if git diff --staged --quiet; then
            echo "ℹ️ No new .txt files to commit."
            exit 0
          fi

          git commit -m "Auto-generate txt files for tex updates [skip ci]"

          # 设置远程 URL 使用 token（用于拉取和推送）
          git remote set-url origin https://x-access-token:${TOKEN}@github.com/${{ github.repository }}.git

          # 先拉取远程变更（使用 rebase），确保本地分支基于最新代码
          git pull --rebase origin main

          # 推送变更
          git push
